<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Designer</title>
    <link rel="stylesheet" href="darkmod.css">
</head>

<body class="dark">

    <div class="container">

        <h1>Theme Designer</h1>

        <button id="Mode">Toggle Theme</button>

        <!-- Dropdown -->
        <div class="dropdown">
            <select>
                <option>Account</option>
                <option>Settings</option>
                <option>Link Device</option>
                <option>Customer Support</option>
            </select>
        </div>

        <!-- Search -->
        <!-- <div class="input">
            <input id="search1" type="search" placeholder="Search for materials">
        </div> -->

        <!-- GitHub Input + Action -->
        <div class="github">
            <input id="githubLink" type="text" placeholder="Paste GitHub Profile Link">
            
            <select id="actionType">
                <option value="click">Click</option>
                <option value="dblclick">Double Click</option>
                <option value="hover">Hover</option>
            </select>

            <button id="addGit">Add</button>
        </div>

        <!-- Saved Links -->
        <div id="savedLinks"></div>

        <!-- Buttons -->
        <div class="actions">
            <button id="singleClick">To Do List</button>
            <button id="doubleClick">PDF Merge</button>
        </div>

        <!-- Slider -->
        <div id="hoverDiv">
            <span>Slide for Assign✅→</span>
            <div id="thumb"></div>
        </div>

    </div>

    <script src="darkmod.js"></script>
</body>
</html>
