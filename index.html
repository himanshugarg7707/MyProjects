<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Launcher</title>

    <!-- CSS -->
    <link rel="stylesheet" href="darkmod.css">

    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<body class="dark">

<div class="container">

    <h1>Smart Launcher</h1>

    <button id="Mode">Toggle Theme</button>

    <!-- INPUT -->
    <div class="github">
        <input id="githubLink" type="text" placeholder="Paste link">

        <select id="actionType">
            <option value="click">Click</option>
            <option value="dblclick">Double Click</option>
            <option value="hover">Hover</option>
        </select>

        <button id="addGit">Add</button>
    </div>

    <!-- SAVED -->
    <div id="savedLinks"></div>

    <!-- STATIC BUTTONS -->
    <div class="actions">
        <button id="singleClick">ToDo</button>
        <button id="doubleClick">PDF</button>
    </div>

    <!-- SLIDER -->
    <div id="hoverDiv">
        <span>Slide →</span>
        <div id="thumb"></div>
    </div>

</div>

<script src="darkmod.js"></script>
</body>
</html>
